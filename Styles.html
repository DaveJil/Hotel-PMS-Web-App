
<style>
  :root{
    --bg:#0b0b0b;
    --bg-soft:#141414;
    --panel:#171717;
    --panel-2:#1f1f1f;
    --gold:#c9a227;
    --gold-soft:#f5e7a7;
    --text:#f5f5f5;
    --muted:#b8b8b8;
    --danger:#e06262;
    --success:#4caf73;
    --border:rgba(201,162,39,.28);
    --shadow:0 12px 32px rgba(0,0,0,.28);
  }
  *{box-sizing:border-box}
  body{
    margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#090909,#14110a);
    color:var(--text)
  }
  .app-shell{min-height:100vh}
  .splash{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:10px;padding:24px}
  .splash-logo,.brand-logo{width:74px;height:74px;object-fit:contain;filter:drop-shadow(0 8px 18px rgba(0,0,0,.35))}
  .login-card, .panel, .table-card{
    background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01)), var(--panel);
    border:1px solid var(--border); border-radius:20px; box-shadow:var(--shadow)
  }
  .screen-wrap{padding:18px;max-width:1440px;margin:0 auto}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
  .login-card{width:min(420px,100%);padding:26px}
  .brand-head{display:flex;align-items:center;gap:14px;margin-bottom:22px}
  .brand-copy h2{margin:0;font-size:1.35rem}
  .brand-copy p{margin:4px 0 0;color:var(--gold-soft);font-size:.95rem}
  label{display:block;font-size:.86rem;color:var(--muted);margin-bottom:6px}
  input, select, textarea{
    width:100%;padding:12px 14px;border-radius:14px;border:1px solid #353535;background:#101010;color:#fff;outline:none
  }
  input:focus, select:focus, textarea:focus{border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,162,39,.18)}
  textarea{min-height:92px;resize:vertical}
  .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
  .form-grid .full{grid-column:1/-1}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap}
  .btn{
    border:none;border-radius:14px;padding:12px 16px;font-weight:700;cursor:pointer;
    transition:transform .08s ease, box-shadow .15s ease, opacity .15s ease;
    box-shadow:0 8px 18px rgba(0,0,0,.18)
  }
  .btn:hover{opacity:.94}
  .btn:active{transform:translateY(1px) scale(.985)}
  .btn-primary{background:linear-gradient(180deg,#dfbf48,#b08a12);color:#111}
  .btn-dark{background:#1e1e1e;color:#fff;border:1px solid var(--border)}
  .btn-outline{background:transparent;color:var(--gold-soft);border:1px solid var(--border)}
  .btn[disabled]{opacity:.55;cursor:not-allowed}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap
  }
  .topbar-left{display:flex;align-items:center;gap:14px}
  .topbar h1{margin:0;font-size:1.35rem}
  .subtle{color:var(--gold-soft);font-size:.92rem}
  .nav-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .tab{
    padding:10px 14px;border-radius:999px;border:1px solid var(--border);background:#131313;color:#fff;cursor:pointer
  }
  .tab.active{background:linear-gradient(180deg,#dfbf48,#b08a12);color:#111}
  .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}
  .stat-card{padding:18px}
  .stat-card .num{font-size:1.8rem;font-weight:800;margin-top:10px}
  .panel{padding:18px;margin-bottom:18px}
  .hidden{display:none!important}
  .table-wrap{overflow:auto}
  table{width:100%;border-collapse:collapse;min-width:760px}
  th,td{padding:12px 10px;border-bottom:1px solid rgba(255,255,255,.06);text-align:left;font-size:.92rem}
  th{color:var(--gold-soft);font-weight:700}
  .badge{display:inline-flex;align-items:center;border-radius:999px;padding:6px 10px;font-size:.76rem;font-weight:700}
  .badge.clean,.badge.resolved,.badge.vacant,.badge.paid{background:rgba(76,175,115,.15);color:#8cf4b2}
  .badge.dirty,.badge.unpaid,.badge.not\ resolved{background:rgba(224,98,98,.15);color:#ffb0b0}
  .badge.occupied,.badge.reserved,.badge.checked\ in{background:rgba(201,162,39,.18);color:#ffeb9a}
  .rooms-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
  .room-card{
    background:#141414;border:1px solid rgba(201,162,39,.18);border-radius:18px;padding:14px
  }
  .room-card h4{margin:0 0 6px}
  .room-meta{font-size:.86rem;color:var(--muted);display:grid;gap:4px}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .toast-stack{position:fixed;right:16px;bottom:16px;display:grid;gap:10px;z-index:9999}
  .toast{padding:14px 16px;border-radius:14px;min-width:260px;background:#121212;border:1px solid var(--border);box-shadow:var(--shadow)}
  .toast.success{border-color:rgba(76,175,115,.36)}
  .toast.error{border-color:rgba(224,98,98,.36)}
  .muted{color:var(--muted)}
  .section-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  .empty{padding:24px;text-align:center;color:var(--muted)}
  @media (max-width: 1100px){
    .stats{grid-template-columns:repeat(2,minmax(0,1fr))}
    .rooms-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  }
  @media (max-width: 720px){
    .form-grid,.stats,.rooms-grid{grid-template-columns:1fr}
    .screen-wrap{padding:12px}
    .panel{padding:14px}
    .login-card{padding:20px}
    .brand-copy h2{font-size:1.1rem}
    .topbar h1{font-size:1.1rem}
  }
</style>
