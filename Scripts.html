<script>
let APP = {
  user: null,
  branding: { hotelName:'Hotel Name', tagline:'Hotel Tagline', logoDataUri:'' },
  dashboard: { totalRooms:0, occupied:0, reserved:0, dirty:0 },
  rooms: [],
  reservations: [],
  bookingHistory: [],
  housekeepingHistory: [],
  maintenanceHistory: [],
  cleaningHistory: [],
  payments: [],
  paymentHistory: [],
  nonRoomAreas: [],
  nonRoomHousekeepingHistory: [],
  nonRoomCleaningHistory: [],
  users: [],
  roles: [],
  channels: [],
  activeTab: 'dashboard',
  reportRange: { start:'', end:'' },
  cleaningReportRange: { start:'', end:'' },
  cleaningReportUser: ''
};

const APARTMENT_FIXED_RATE_CLIENT = 300000;

document.addEventListener('DOMContentLoaded', function(){
  boot();
});

function boot(){
  renderLogin();

  google.script.run
    .withSuccessHandler(function(res){
      if (res && res.ok && res.user) {
        mergeAppData({
          user: res.user || null,
          branding: res.branding || APP.branding,
          dashboard: res.dashboard || APP.dashboard,
          rooms: res.rooms || [],
          reservations: res.reservations || [],
          bookingHistory: res.bookingHistory || [],
          housekeepingHistory: res.housekeepingHistory || [],
          maintenanceHistory: res.maintenanceHistory || [],
          cleaningHistory: res.cleaningHistory || [],
          payments: res.paymentHistory || [],
          paymentHistory: res.paymentHistory || [],
          nonRoomAreas: res.nonRoomAreas || [],
          nonRoomHousekeepingHistory: res.nonRoomHousekeepingHistory || [],
          nonRoomCleaningHistory: res.nonRoomCleaningHistory || [],
          users: res.users || [],
          roles: res.roles || [],
          channels: res.channels || []
        });

        renderAppShell();
        renderActiveTab();
      } else {
        renderLogin();
      }
    })
    .withFailureHandler(function(){
      renderLogin();
    })
    .getAppBootstrap();
}

function renderLogin(){
  const app = document.getElementById('app');
  if (!app) return;

  app.innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <div class="brand-head">
          ${brandLogoHtml()}
          <div class="brand-copy">
            <h2>${escapeHtml((APP.branding && APP.branding.hotelName) || 'NDDC Clubhouse')}</h2>
            <p>${escapeHtml((APP.branding && APP.branding.tagline) || 'Redefining Luxury Living')}</p>
          </div>
        </div>

        <div style="display:grid;gap:14px">
          <div>
            <label>Username</label>
            <input id="loginUsername" placeholder="Enter username">
          </div>
          <div>
            <label>Password / PIN</label>
            <input id="loginPassword" type="password" placeholder="Enter password">
          </div>
          <button class="btn btn-primary" onclick="doLogin(this)">Login</button>
        </div>
      </div>
    </div>
    <div class="toast-stack" id="toastStack"></div>
  `;
}

function doLogin(btn){
  const username = (document.getElementById('loginUsername')?.value || '').trim();
  const password = document.getElementById('loginPassword')?.value || '';

  if (!username || !password) {
    toast('Enter login details.', 'error');
    return;
  }

  setBusy(btn, true);

  google.script.run
    .withSuccessHandler(function(res){
      setBusy(btn, false);

      if (!res || !res.ok) {
        toast((res && res.message) || 'Login failed', 'error');
        return;
      }

      APP.user = res.user || null;
      loadApp();
      toast(`Welcome ${res.user.fullName || res.user.username || ''}`, 'success');
    })
    .withFailureHandler(function(err){
      setBusy(btn, false);
      toast((err && err.message) || 'Login failed', 'error');
    })
    .login(username, password);
}

function mergeAppData(next){
  if (!next) return;
  APP = Object.assign({}, APP, next);
  if (next.paymentHistory && !next.payments) APP.payments = next.paymentHistory;
  if (next.payments && !next.paymentHistory) APP.paymentHistory = next.payments;
}

function loadApp(){
  google.script.run
    .withSuccessHandler(function(res){
      if(!res || !res.ok){
        renderLogin();
        toast((res && res.message) || 'Failed to load app', 'error');
        return;
      }

      mergeAppData({
        user: res.user || null,
        branding: res.branding || APP.branding,
        dashboard: res.dashboard || APP.dashboard,
        rooms: res.rooms || [],
        reservations: res.reservations || [],
        bookingHistory: res.bookingHistory || [],
        housekeepingHistory: res.housekeepingHistory || [],
        maintenanceHistory: res.maintenanceHistory || [],
        cleaningHistory: res.cleaningHistory || [],
        payments: res.paymentHistory || [],
        paymentHistory: res.paymentHistory || [],
        nonRoomAreas: res.nonRoomAreas || [],
        nonRoomHousekeepingHistory: res.nonRoomHousekeepingHistory || [],
        nonRoomCleaningHistory: res.nonRoomCleaningHistory || [],
        users: res.users || [],
        roles: res.roles || [],
        channels: res.channels || []
      });

      renderAppShell();
      renderActiveTab();
    })
    .withFailureHandler(function(){
      renderLogin();
      toast('Failed to load app', 'error');
    })
    .getAppBootstrap();
}

function renderAppShell(){
  const app = document.getElementById('app');
  if (!app) return;

  const isHousekeeping = APP.user && APP.user.role === 'Housekeeping';
  const tabs = isHousekeeping
    ? ['dashboard','rooms','housekeeping','nonRoomHousekeeping','cleaningHistory','maintenance','admin']
    : ['dashboard','rooms','reservations','housekeeping','nonRoomHousekeeping','cleaningHistory','bookingHistory','paymentHistory','reports','maintenance','admin'];

  app.innerHTML = `
    <div class="screen-wrap">
      <div class="topbar">
        <div class="topbar-left">
          ${brandLogoHtml()}
          <div>
            <h1>${escapeHtml(APP.branding.hotelName || 'NDDC Clubhouse')}</h1>
            <div class="subtle">${escapeHtml(APP.branding.tagline || '')}</div>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-dark" onclick="hardRefreshApp()">Refresh</button>
          <button class="btn btn-outline" onclick="openMaintenanceModal()">New Maintenance Log</button>
          ${isHousekeeping ? '' : `<button class="btn btn-primary" onclick="openReservationModal()">New Reservation</button>`}
          <button class="btn btn-dark" onclick="logoutApp()">Logout</button>
        </div>
      </div>

      <div class="nav-tabs">
        ${tabs.map(function(tab){
          return `<button class="tab ${APP.activeTab===tab?'active':''}" onclick="setTab('${escapeJs(tab)}')">${labelForTab(tab)}</button>`;
        }).join('')}
      </div>

      <div id="dashboardSection" style="display:none"></div>
      <div id="roomsSection" style="display:none"></div>
      <div id="reservationsSection" style="display:none"></div>
      <div id="housekeepingSection" style="display:none"></div>
      <div id="nonRoomSection" style="display:none"></div>
      <div id="cleaningHistorySection" style="display:none"></div>
      <div id="bookingHistorySection" style="display:none"></div>
      <div id="paymentHistorySection" style="display:none"></div>
      <div id="reportSection" style="display:none"></div>
      <div id="maintenanceSection" style="display:none"></div>
      <div id="adminSection" style="display:none"></div>
    </div>
    <div class="toast-stack" id="toastStack"></div>
  `;
}

function renderActiveTab(){
  hideAllSections();
  switch(APP.activeTab){
    case 'dashboard':
      document.getElementById('dashboardSection').style.display='block';
      renderDashboard();
      break;
    case 'rooms':
      document.getElementById('roomsSection').style.display='block';
      renderRooms();
      break;
    case 'reservations':
      document.getElementById('reservationsSection').style.display='block';
      renderReservations();
      break;
    case 'housekeeping':
      document.getElementById('housekeepingSection').style.display='block';
      renderHousekeeping();
      break;
    case 'nonRoomHousekeeping':
      document.getElementById('nonRoomSection').style.display='block';
      renderNonRoomHousekeeping();
      break;
    case 'cleaningHistory':
      document.getElementById('cleaningHistorySection').style.display='block';
      renderCleaningHistory();
      break;
    case 'bookingHistory':
      document.getElementById('bookingHistorySection').style.display='block';
      renderBookingHistory();
      break;
    case 'paymentHistory':
      document.getElementById('paymentHistorySection').style.display='block';
      renderPaymentHistory();
      break;
    case 'reports':
      document.getElementById('reportSection').style.display='block';
      renderReports();
      break;
    case 'maintenance':
      document.getElementById('maintenanceSection').style.display='block';
      renderMaintenance();
      break;
    case 'admin':
      document.getElementById('adminSection').style.display='block';
      renderAdmin();
      break;
    default:
      document.getElementById('dashboardSection').style.display='block';
      renderDashboard();
  }
}

function hideAllSections(){
  [
    'dashboardSection','roomsSection','reservationsSection','housekeepingSection',
    'nonRoomSection','cleaningHistorySection','bookingHistorySection',
    'paymentHistorySection','reportSection','maintenanceSection','adminSection'
  ].forEach(function(id){
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
}

function setTab(tab){
  APP.activeTab = tab;
  renderAppShell();
  renderActiveTab();
}

function brandLogoHtml(){
  const src = (APP.branding && APP.branding.logoDataUri) || '';
  if (!src) return '';
  return `<img class="brand-logo" src="${src}" alt="Logo" onerror="this.style.display='none'">`;
}

function rerenderReservationsOnly(){
  if (APP.activeTab === 'reservations') renderReservations();
}

function rerenderRoomsOnly(){
  if (APP.activeTab === 'rooms' || APP.activeTab === 'dashboard') {
    if (APP.activeTab === 'rooms') renderRooms();
    if (APP.activeTab === 'dashboard') renderDashboard();
  }
}

function rerenderReportsOnly(){
  if (APP.activeTab === 'reports') renderReports();
}

function rerenderHousekeepingOnly(){
  if (APP.activeTab === 'housekeeping') renderHousekeeping();
  if (APP.activeTab === 'cleaningHistory') renderCleaningHistory();
}

function rerenderNonRoomOnly(){
  if (APP.activeTab === 'nonRoomHousekeeping') renderNonRoomHousekeeping();
  if (APP.activeTab === 'cleaningHistory') renderCleaningHistory();
}

function renderDashboard(){
  const el = document.getElementById('dashboardSection');
  if (!el) return;

  el.innerHTML = `
    <div class="stats">
      ${statCard('Total Rooms', APP.dashboard.totalRooms)}
      ${statCard('Occupied', APP.dashboard.occupied)}
      ${statCard('Reserved', APP.dashboard.reserved)}
      ${statCard('Dirty', APP.dashboard.dirty)}
    </div>
    <div class="panel">
      <div class="section-title">
        <strong>Room Overview</strong>
        <span class="muted">${APP.rooms.length} rooms loaded from Google Sheets</span>
      </div>
      <div id="roomList" class="rooms-grid"></div>
    </div>
  `;

  const list = document.getElementById('roomList');
  list.innerHTML = '';

  APP.rooms.forEach(function(r){
    const div = document.createElement('div');
    div.className = 'room-card';
    div.innerHTML = `
      <div class="room-head">
        <div>
          <h3>${escapeHtml(r.roomNo)}</h3>
          <div class="subtle">${escapeHtml(r.roomType)}</div>
        </div>
        <div>${badge(r.status)}</div>
      </div>
      <div class="room-meta">
        <span>Rate</span><strong>₦${fmt(r.rate)}</strong>
        <span>Housekeeping</span><strong>${badge(r.housekeepingStatus)}</strong>
        <span>Maintenance</span><strong>${badge(r.maintenanceStatus)}</strong>
      </div>
    `;
    list.appendChild(div);
  });
}

function renderRooms(){
  const el = document.getElementById('roomsSection');
  if (!el) return;

  const apartmentGroups = [...new Set(APP.rooms.map(function(r){ return r.apartmentGroup; }).filter(Boolean))];

  el.innerHTML = `
    <div class="panel">
      <div class="section-title">
        <strong>Rooms & Apartments</strong>
        <span class="muted">${APP.rooms.length} rooms • ${apartmentGroups.length} apartment groups</span>
      </div>
      <div id="roomListFull" class="rooms-grid"></div>
    </div>
  `;

  const list = document.getElementById('roomListFull');
  list.innerHTML = '';

  APP.rooms.forEach(function(r){
    const div = document.createElement('div');
    div.className = 'room-card';
    div.innerHTML = `
      <div class="room-head">
        <div>
          <h3>${escapeHtml(r.roomNo)}</h3>
          <div class="subtle">${escapeHtml(r.roomType)}</div>
        </div>
        <div>${badge(r.status)}</div>
      </div>
      <div class="room-meta">
        <span>Rate</span><strong>₦${fmt(r.rate)}</strong>
        <span>Apartment</span><strong>${escapeHtml(r.apartmentGroup || '-')}</strong>
        <span>Housekeeping</span><strong>${badge(r.housekeepingStatus)}</strong>
      </div>
    `;
    list.appendChild(div);
  });
}

function getReservationOptions(){
  const options = [];
  const addedApartments = {};

  APP.rooms.forEach(function(r){
    if (r.apartmentGroup && !addedApartments[r.apartmentGroup]) {
      addedApartments[r.apartmentGroup] = true;
      options.push({
        value: r.apartmentGroup,
        label: `${r.apartmentGroup} - Apartment - ₦${fmt(APARTMENT_FIXED_RATE_CLIENT)}`
      });
    }
  });

  APP.rooms.forEach(function(r){
    options.push({
      value: r.roomNo,
      label: `${r.roomNo} - ${r.roomType} - ₦${fmt(r.rate)}`
    });
  });

  return options;
}

function checkMailAuthorizationUI(callback){
  google.script.run
    .withSuccessHandler(function(res){
      if (typeof callback === 'function') callback(res);
    })
    .withFailureHandler(function(err){
      if (typeof callback === 'function') {
        callback({ ok:false, message:(err && err.message) || 'Mail authorization check failed.' });
      }
    })
    .checkMailAuthorization();
}

function hardRefreshApp(){
  google.script.run
    .withSuccessHandler(function(res){
      if (!res || !res.ok) {
        toast((res && res.message) || 'Refresh failed', 'error');
        return;
      }

      const currentTab = APP.activeTab || 'dashboard';

      APP = {
        user: res.user || null,
        branding: res.branding || { hotelName:'NDDC Clubhouse', tagline:'Redefining Luxury Living', logoDataUri:'' },
        dashboard: res.dashboard || { totalRooms:0, occupied:0, reserved:0, dirty:0 },
        rooms: res.rooms || [],
        reservations: res.reservations || [],
        bookingHistory: res.bookingHistory || [],
        housekeepingHistory: res.housekeepingHistory || [],
        maintenanceHistory: res.maintenanceHistory || [],
        cleaningHistory: res.cleaningHistory || [],
        payments: res.paymentHistory || [],
        paymentHistory: res.paymentHistory || [],
        nonRoomAreas: res.nonRoomAreas || [],
        nonRoomHousekeepingHistory: res.nonRoomHousekeepingHistory || [],
        nonRoomCleaningHistory: res.nonRoomCleaningHistory || [],
        users: res.users || [],
        roles: res.roles || [],
        channels: res.channels || [],
        activeTab: currentTab,
        reportRange: APP.reportRange || { start:'', end:'' },
        cleaningReportRange: APP.cleaningReportRange || { start:'', end:'' },
        cleaningReportUser: APP.cleaningReportUser || ''
      };

      renderAppShell();
      renderActiveTab();
      toast('Data refreshed.', 'success');
    })
    .withFailureHandler(function(err){
      toast((err && err.message) || 'Refresh failed', 'error');
    })
    .getAppBootstrap();
}

function openReservationModal(editResId){
  const existing = APP.reservations.find(function(r){ return r.resId === editResId; }) || null;
  const today = new Date();
  const tomorrow = new Date(today.getTime() + 86400000);
  const roomOptions = getReservationOptions().map(function(opt){
    return `<option value="${escapeAttr(opt.value)}" ${existing && existing.roomNo===opt.value ? 'selected' : ''}>${escapeHtml(opt.label)}</option>`;
  }).join('');

  showModal(existing ? 'Edit Reservation' : 'New Reservation', `
    <div class="form-grid">
      <div><label>Guest Name</label><input id="resGuestName" value="${escapeAttr(existing ? existing.guestName : '')}"></div>
      <div><label>Phone</label><input id="resPhone" value="${escapeAttr(existing ? existing.phone : '')}"></div>
      <div><label>Email (Optional)</label><input id="resEmail" type="email" value="${escapeAttr(existing ? existing.email : '')}"></div>
      <div><label>Room / Apartment</label><select id="resRoomNo" onchange="updateReservationPricePreview()">${roomOptions}</select></div>
      <div><label>Adults</label><input id="resAdults" type="number" min="1" max="2" value="${escapeAttr(existing ? existing.adults : 1)}"></div>
      <div><label>Check In</label><input id="resCheckIn" type="date" value="${escapeAttr(existing ? existing.checkIn : today.toISOString().slice(0,10))}" onchange="updateReservationPricePreview()"></div>
      <div><label>Check Out</label><input id="resCheckOut" type="date" value="${escapeAttr(existing ? existing.checkOut : tomorrow.toISOString().slice(0,10))}" onchange="updateReservationPricePreview()"></div>
      <div><label>Discount %</label><input id="resDiscount" type="number" min="0" max="100" value="${escapeAttr(existing ? existing.discountPct : 0)}" onchange="updateReservationPricePreview()"></div>
      <div>
        <label>Payment Status</label>
        <select id="resPaymentStatus" onchange="updateReservationPricePreview()">
          <option ${(existing && existing.paymentStatus==='Unpaid') ? 'selected' : ''}>Unpaid</option>
          <option ${(existing && existing.paymentStatus==='Paid') ? 'selected' : ''}>Paid</option>
          <option ${(existing && existing.paymentStatus==='Part Paid') ? 'selected' : ''}>Part Paid</option>
          <option ${(existing && existing.paymentStatus==='Free/PR') ? 'selected' : ''}>Free/PR</option>
        </select>
      </div>
      <div><label>Channel</label><select id="resChannel">${APP.channels.map(function(c){ return `<option ${existing && existing.channel===c ? 'selected' : ''}>${escapeHtml(c)}</option>`; }).join('')}</select></div>
      <div><label>RRR Number</label><input id="resRRR" value="${escapeAttr(existing ? (existing.rrrNumber || '') : '')}"></div>
      <div class="full">
        <div class="panel" style="margin:0">
          <div><strong>Price Preview</strong></div>
          <div id="reservationPricePreview" class="subtle">Calculating...</div>
        </div>
      </div>
      <div class="full"><label>Notes</label><textarea id="resNotes">${escapeHtml(existing ? existing.notes : '')}</textarea></div>
      <div class="full btn-row">
        <button class="btn btn-primary" onclick="saveReservation(this, '${escapeJs(editResId || '')}')">${existing ? 'Update' : 'Save'} Reservation</button>
        <button class="btn btn-dark" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  `);

  updateReservationPricePreview();
}

function getSelectedReservationUnitRate(roomNo){
  const grouped = APP.rooms.find(function(r){ return String(r.apartmentGroup || '') === String(roomNo); });
  if (grouped) return APARTMENT_FIXED_RATE_CLIENT;

  const room = APP.rooms.find(function(r){ return r.roomNo === roomNo; });
  if (room) return Number(room.rate || 0);

  return 0;
}

function nightsBetweenClient(checkIn, checkOut){
  if (!checkIn || !checkOut) return 0;
  const start = new Date(checkIn);
  const end = new Date(checkOut);
  if (isNaN(start.getTime()) || isNaN(end.getTime())) return 0;
  return Math.max(0, Math.round((end - start) / 86400000));
}

function isFreePrClient(paymentStatus){
  const v = String(paymentStatus || '').trim().toLowerCase();
  return v === 'free/pr' || v === 'pr(free)' || v === 'free' || v === 'pr';
}

function updateReservationPricePreview(){
  const roomNo = document.getElementById('resRoomNo')?.value || '';
  const checkIn = document.getElementById('resCheckIn')?.value || '';
  const checkOut = document.getElementById('resCheckOut')?.value || '';
  const discountPct = Number(document.getElementById('resDiscount')?.value || 0);
  const paymentStatus = document.getElementById('resPaymentStatus')?.value || 'Unpaid';
  const target = document.getElementById('reservationPricePreview');
  if (!target) return;

  const nights = nightsBetweenClient(checkIn, checkOut);
  const baseRate = getSelectedReservationUnitRate(roomNo);
  const rate = isFreePrClient(paymentStatus) ? 0 : baseRate;
  const gross = rate * nights;
  const net = isFreePrClient(paymentStatus) ? 0 : Math.round(gross * (1 - discountPct / 100));

  target.innerHTML = `
    <div>Rate: ${formatMoney(rate)} per night</div>
    <div>Nights: ${escapeHtml(String(nights))}</div>
    <div>Discount: ${escapeHtml(String(discountPct))}%</div>
    <div>Payment Status: ${escapeHtml(paymentStatus)}</div>
    <div><strong>Total: ${formatMoney(net)}</strong></div>
  `;
}

function saveReservation(btn, resId){
  const payload = {
    guestName: document.getElementById('resGuestName').value.trim(),
    phone: document.getElementById('resPhone').value.trim(),
    email: document.getElementById('resEmail').value.trim(),
    roomNo: document.getElementById('resRoomNo').value,
    adults: Number(document.getElementById('resAdults').value || 1),
    checkIn: document.getElementById('resCheckIn').value,
    checkOut: document.getElementById('resCheckOut').value,
    discountPct: Number(document.getElementById('resDiscount').value || 0),
    paymentStatus: document.getElementById('resPaymentStatus').value,
    rrrNumber: document.getElementById('resRRR').value.trim(),
    channel: document.getElementById('resChannel').value,
    notes: document.getElementById('resNotes').value.trim()
  };

  setBusy(btn, true);
  const runner = google.script.run
    .withSuccessHandler(function(res){
      setBusy(btn, false);
      if (!res.ok) return toast(res.message || 'Reservation failed', 'error');

      mergeAppData(res.data);
      rerenderReservationsOnly();
      rerenderRoomsOnly();
      rerenderReportsOnly();
      closeModal();
      toast(res.message || 'Reservation saved', 'success');
    })
    .withFailureHandler(function(err){
      setBusy(btn, false);
      toast((err && err.message) || 'Reservation failed', 'error');
    });

  if (resId) runner.updateReservation(resId, payload);
  else runner.createReservation(payload);
}

function renderReservations(){
  const el = document.getElementById('reservationsSection');
  if (!el) return;

  const activeReservations = (APP.reservations || []).filter(function(r){
    return r.status === 'Reserved' || r.status === 'Checked In';
  });

  el.innerHTML = `
    <div class="panel">
      <div class="section-title">
        <strong>Reservations</strong>
        <div class="btn-row">
          <button class="btn btn-dark" onclick="hardRefreshApp()">Refresh</button>
          <button class="btn btn-primary" onclick="openReservationModal()">Add Reservation</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Res ID</th>
              <th>Guest</th>
              <th>Room</th>
              <th>Stay</th>
              <th>Adults</th>
              <th>Discount %</th>
              <th>Net Amount</th>
              <th>Channel</th>
              <th>Status</th>
              <th>Payment</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${activeReservations.length ? activeReservations.map(function(r){
              return `
                <tr>
                  <td>${escapeHtml(r.resId)}</td>
                  <td>
                    ${escapeHtml(r.guestName)}
                    <div class="subtle">${escapeHtml(r.phone || '')}</div>
                    <div class="subtle">${escapeHtml(r.email || '')}</div>
                  </td>
                  <td>${escapeHtml(r.roomNo)}<div class="subtle">${escapeHtml(r.roomType || '')}</div></td>
                  <td>${escapeHtml(r.checkIn)} → ${escapeHtml(r.checkOut)}<div class="subtle">${escapeHtml(String(r.nights))} night(s)</div></td>
                  <td>${escapeHtml(String(r.adults))}</td>
                  <td>${escapeHtml(String(r.discountPct || 0))}%</td>
                  <td>₦${fmt(r.netAmount)}</td>
                  <td>${escapeHtml(r.channel || '-')}</td>
                  <td>${badge(r.status)}</td>
                  <td>${badge(r.paymentStatus)}</td>
                  <td>
                    <div class="btn-row">
                      ${r.status==='Reserved' ? `<button class="btn btn-outline" onclick="openReservationModal('${escapeJs(r.resId)}')">Edit</button>` : ''}
                      ${r.status==='Reserved' ? `<button class="btn btn-outline" onclick="actionReservation('${escapeJs(r.resId)}','Check In', this)">Check In</button>` : ''}
                      ${r.status==='Checked In' ? `<button class="btn btn-outline" onclick="checkoutReservation('${escapeJs(r.resId)}', this)">Check Out</button>` : ''}

function downloadCheckoutReceiptPdf(btn, resId){

    .withFailureHandler(function(err){

function splitCsvNames(value){
  return String(value || '').split(',').map(function(x){ return x.trim(); }).filter(Boolean);
}

function splitJoinTimes(value){
  return String(value || '').split('|').map(function(x){ return x.trim(); }).filter(Boolean);
}

function parseJoinEntries(row){
  const names = splitCsvNames(row.joinedBy || '');
  const times = splitJoinTimes(row.joinTimes || '');
  return names.map(function(name, i){
    const raw = times[i] || '';
    const atIndex = raw.indexOf('@');
    const joinedAtRaw = atIndex > -1 ? raw.slice(atIndex + 1).trim() : raw.trim();
    return {
      name: name,
      joinedAt: parseDateValue(joinedAtRaw, false)
    };
  }).filter(function(x){ return x.name; });
}

function extractCleaningParticipants(row){
  const names = [];
  [row.startedBy].forEach(function(name){
    if (name && names.indexOf(name) === -1) names.push(name);
  });
  splitCsvNames(row.joinedBy || '').forEach(function(name){
    if (name && names.indexOf(name) === -1) names.push(name);
  });
  return names.filter(Boolean);
}

function getCleaningReportUsers(){
  const names = new Set();
  [...APP.cleaningHistory, ...APP.nonRoomCleaningHistory].forEach(function(row){
    extractCleaningParticipants(row).forEach(function(name){ names.add(name); });
  });
  const self = getCurrentCleaningReportUser();
  if (self) names.add(self);
  return Array.from(names).filter(Boolean).sort(function(a,b){ return a.localeCompare(b); });
}

function getCleaningReportDataForView(){
  const targetUser = APP.user && APP.user.role === 'Housekeeping'
    ? getCurrentCleaningReportUser()
    : (APP.cleaningReportUser || '');

  const rows = buildCleaningReportRows(targetUser, APP.cleaningReportRange.start, APP.cleaningReportRange.end);
  const summaryMap = {};

  rows.forEach(function(row){
    if (!summaryMap[row.user]) summaryMap[row.user] = { user: row.user, roomSessions: 0, nonRoomSessions: 0, totalMinutes: 0 };
    if (row.placeType === 'Room') summaryMap[row.user].roomSessions += 1;
    if (row.placeType === 'Non-Room') summaryMap[row.user].nonRoomSessions += 1;
    summaryMap[row.user].totalMinutes += Number(row.durationMins || 0);
  });

  const summary = Object.values(summaryMap).sort(function(a,b){ return a.user.localeCompare(b.user); });

  return {
    rows: rows,
    summary: summary,
    totalMinutes: rows.reduce(function(sum, row){ return sum + Number(row.durationMins || 0); }, 0),
    targetUser: targetUser
  };
}

function buildCleaningReportRows(targetUser, startDate, endDate){
  const rows = [];

  function pushRowsFromSession(row, placeType, place){
    if (!isWithinRangeByFields(row, startDate, endDate, ['startedAt','finishedAt'])) return;

    const sessionEnd = parseDateValue(row.finishedAt, true) || new Date();
    const totalSessionMins = Number(row.durationMins || 0);

    if (row.startedBy) {
      rows.push({
        user: row.startedBy,
        placeType: placeType,
        place: place,
        startedAt: row.startedAt || row.finishedAt || '-',
        durationMins: totalSessionMins,
        note: row.cleaningNote || ''
      });
    }

    parseJoinEntries(row).forEach(function(joiner){
      if (!joiner.joinedAt || !sessionEnd) return;
      const mins = Math.max(0, Math.round((sessionEnd - joiner.joinedAt) / 60000));
      rows.push({
        user: joiner.name,
        placeType: placeType,
        place: place,
        startedAt: formatDateValue(joiner.joinedAt) || row.startedAt || '-',
        durationMins: mins,
        note: (row.cleaningNote || '') + (row.cleaningNote ? ' | ' : '') + 'Joined session'
      });
    });
  }

  APP.cleaningHistory.forEach(function(row){ pushRowsFromSession(row, 'Room', row.roomNo || '-'); });
  APP.nonRoomCleaningHistory.forEach(function(row){ pushRowsFromSession(row, 'Non-Room', row.area || '-'); });

  return rows
    .filter(function(row){ return !targetUser || row.user === targetUser; })
    .sort(function(a,b){ return String(b.startedAt || '').localeCompare(String(a.startedAt || '')); });
}

function filterRowsByDateRange(rows, startDate, endDate, fields){
  return (rows || []).filter(function(row){
    return isWithinRangeByFields(row, startDate, endDate, fields);
  });
}

function isWithinRangeByFields(row, startDate, endDate, fields){
  const start = startDate ? parseDateValue(startDate, false) : null;
  const end = endDate ? parseDateValue(endDate, true) : null;
  if (!start && !end) return true;

  return (fields || []).some(function(field){
    const value = row && row[field];
    const parsed = parseDateValue(value, !!(typeof value === 'string' && value.length <= 10));
    if (!parsed) return false;
    if (start && parsed < start) return false;
    if (end && parsed > end) return false;
    return true;
  });
}

function parseDateValue(value, endOfDay){
  if (!value) return null;
  if (value instanceof Date && !isNaN(value.getTime())) return value;
  const raw = String(value).trim();
  if (!raw) return null;
  let normalized = raw;
  if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) normalized = raw + (endOfDay ? 'T23:59:59' : 'T00:00:00');
  else if (/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(raw)) {
    const parts = raw.split('/');
    normalized = `${parts[2].length===2?'20'+parts[2]:parts[2]}-${String(parts[0]).padStart(2,'0')}-${String(parts[1]).padStart(2,'0')}${endOfDay ? 'T23:59:59' : 'T00:00:00'}`;
  } else if (/^\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}$/.test(raw)) normalized = raw.replace(' ','T') + ':00';
  const d = new Date(normalized);
  return isNaN(d.getTime()) ? null : d;
}

function formatDateValue(value){
  const d = parseDateValue(value, false);
  if (!d) return '';
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
}

  const report = getCleaningReportDataForView();
  const rangeText = `${APP.cleaningReportRange.start || 'Beginning'} to ${APP.cleaningReportRange.end || 'Today'}`;
  return `
    <html>
      <head>
        <title>Cleaning Report</title>
        <style>
          @page{size:A4 landscape;margin:14mm}
          body{font-family:Arial,sans-serif;padding:24px;color:#111}
          h1,h2{margin:0 0 10px}
          .muted{color:#555;margin-bottom:16px}
          table{width:100%;border-collapse:collapse;margin-bottom:24px}
          th,td{border:1px solid #ddd;padding:8px;text-align:left;font-size:12px}
          th{background:#f4f4f4}
        </style>
      </head>
      <body>
        <h1>Cleaning Report</h1>
        <div class="muted">Range: ${escapeHtml(rangeText)}${report.targetUser ? ` | User: ${escapeHtml(report.targetUser)}` : ''}</div>
        <h2>User Summary</h2>
        <table>
          <thead><tr><th>User</th><th>Room Sessions</th><th>Non-Room Sessions</th><th>Total Minutes</th></tr></thead>
          <tbody>
            ${report.summary.map(function(r){
              return `<tr><td>${escapeHtml(r.user)}</td><td>${escapeHtml(String(r.roomSessions))}</td><td>${escapeHtml(String(r.nonRoomSessions))}</td><td>${escapeHtml(String(r.totalMinutes))}</td></tr>`;
            }).join('') || '<tr><td colspan="4">No summary records</td></tr>'}
          </tbody>
        </table>
        <h2>Cleaning Details</h2>
        <table>
          <thead><tr><th>User</th><th>Type</th><th>Place</th><th>Date</th><th>Duration (Mins)</th><th>Note</th></tr></thead>
          <tbody>
            ${report.rows.map(function(r){
              return `<tr><td>${escapeHtml(r.user)}</td><td>${escapeHtml(r.placeType)}</td><td>${escapeHtml(r.place)}</td><td>${escapeHtml(r.startedAt || '-')}</td><td>${escapeHtml(String(r.durationMins || 0))}</td><td>${escapeHtml(r.note || '-')}</td></tr>`;
            }).join('') || '<tr><td colspan="6">No detail records</td></tr>'}
          </tbody>
        </table>
      </body>
    </html>
  `;
}

function openPrintWindow(html){
  const win = window.open('', '_blank');
  if (!win) return toast('Please allow pop-ups to print the report.', 'error');
  win.document.open();
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(function(){ win.print(); }, 400);
}

function printBookingPaymentReport(){
  openPrintWindow(buildBookingPaymentReportHtml());
}

function printCleaningReport(){
  openPrintWindow(buildCleaningReportHtml());
}

    })

      setBusy(btn, false);
      toast((err && err.message) || 'Report download failed', 'error');

function downloadBase64File(fileName, mimeType, base64){
  if (!base64) return toast('No file data returned.', 'error');
  const link = document.createElement('a');
  link.href = `data:${mimeType};base64,${base64}`;
  link.download = fileName;
  document.body.appendChild(link);
  link.click();
  link.remove();
}

function computeLateCheckoutAmount(row){
  if (String(row.paymentStatus || '') === 'Free/PR') return 0;
  const rate = Number(row.rate || 0);
  const discountPct = Number(row.discountPct || 0);
  return Math.round(rate * (1 - discountPct / 100) * 0.5);
}

function formatMoney(n){
  return `₦${fmt(n)}`;
}

function showModal(title, body){
  const existing = document.getElementById('modalHost');
  if (existing) existing.remove();

  const host = document.createElement('div');
  host.id = 'modalHost';
  host.innerHTML = `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:9998">
      <div class="panel" style="width:min(760px,100%);max-height:90vh;overflow:auto">
        <div class="section-title"><strong>${escapeHtml(title)}</strong><button class="btn btn-dark" onclick="closeModal()">Close</button></div>
        ${body}
      </div>
    </div>
  `;
  document.body.appendChild(host);
}

function closeModal(){
  const m = document.getElementById('modalHost');
  if (m) m.remove();
}

function toast(message, type){
  const stack = document.getElementById('toastStack') || (function(){
    const div = document.createElement('div');
    div.id = 'toastStack';
    div.className = 'toast-stack';
    document.body.appendChild(div);
    return div;
  })();

  const t = document.createElement('div');
  t.className = `toast ${type || 'success'}`;
  t.textContent = message;
  stack.appendChild(t);
  setTimeout(function(){ t.remove(); }, 3500);
}

function setBusy(btn, busy){
  if (!btn) return;
  if (!btn.dataset.label) btn.dataset.label = btn.textContent;
  btn.disabled = busy;
  btn.textContent = busy ? 'Please wait...' : btn.dataset.label;
}

function statCard(label, value){
  return `<div class="panel stat-card"><div class="muted">${escapeHtml(label)}</div><div class="num">${escapeHtml(String(value))}</div></div>`;
}

function badge(text){
  const cls = String(text || '').toLowerCase().replace(/\s+/g,' ');
  return `<span class="badge ${cls}">${escapeHtml(String(text || '-'))}</span>`;
}

function labelForTab(tab){
  const map = {
    dashboard:'Dashboard',
    rooms:'Rooms',
    reservations:'Reservations',
    housekeeping:'Housekeeping',
    nonRoomHousekeeping:'Non-Room Housekeeping',
    cleaningHistory:'Cleaning History',
    bookingHistory:'Booking History',
    paymentHistory:'Payment History',
    reports:'Reports',
    maintenance:'Maintenance',
    admin:'Admin'
  };
  return map[tab] || tab;
}

function fmt(n){
  return Number(n || 0).toLocaleString();
}

function escapeHtml(str){
  return String(str == null ? '' : str)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#39;");
}

function escapeAttr(str){
  return String(str == null ? '' : str)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#39;");
}

function escapeJs(str){
  return String(str == null ? '' : str)
    .replaceAll('\\','\\\\')
    .replaceAll("'","\\'")
    .replaceAll('"','\\"')
    .replaceAll('\n','\\n')
    .replaceAll('\r','');
}
